# 语音日历部署编排。
#
# 同机三项目隔离（见 BRIEF §3.5）：
#   - 独立 compose project：启动用 `docker compose -p voice-calendar up -d`
#   - 后端对外固定端口 8081（另两项目用 8082 等）
#   - 独立目录 /opt/voice-calendar
# 前端不进容器：vite 构建出的静态产物由宿主机共享 Caddy 直接 file_server 托管，
# Caddy 把 /api/* 反代到本服务 8081（见 deploy/voice.caddy）。

services:
  backend:
    build:
      context: ./backend
    image: voice-calendar-backend:latest
    container_name: voice-calendar-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # SQLite 落到挂载卷，容器重建不丢数据
      - DATABASE_URL=sqlite:////data/voice_calendar.db
    volumes:
      - ./data:/data
    ports:
      - "127.0.0.1:8081:8081"
